<!-- Meru Trophy: WhatsApp Order Confirmation Button on Order Status / Thank You page -->
<style>
  .meru-wa-order-box {
    margin: 22px 0;
    padding: 22px;
    background: #f0fdf4;
    border: 2px solid #25D366;
    border-radius: 12px;
    text-align: center;
  }
  .meru-wa-order-box h3 {
    margin: 0 0 8px;
    font-size: 18px;
    color: #166534;
    font-weight: 700;
  }
  .meru-wa-order-box p {
    margin: 0 0 16px;
    font-size: 14px;
    color: #14532d;
    line-height: 1.5;
  }
  .meru-wa-order-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: #25D366;
    color: #fff !important;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none !important;
    border-radius: 6px;
    box-shadow: 0 2px 10px rgba(37, 211, 102, 0.25);
    transition: background 0.2s ease, transform 0.1s ease;
  }
  .meru-wa-order-btn:hover { background: #1ebe5d; }
  .meru-wa-order-btn:active { transform: scale(0.98); }
  .meru-wa-order-btn svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
</style>

<div id="meru-wa-order-container"></div>

<script>
(function () {
  function formatINR(amount) {
    var rupees = Number(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return '₹' + rupees;
  }
  function buildAndInsert() {
    if (typeof Shopify === 'undefined' || !Shopify.checkout) {
      // Not on order status page (or data not ready); retry briefly
      return false;
    }
    var c = Shopify.checkout;
    var lines = [];
    lines.push('Hi! I have just placed an order on merutrophy.in.');
    lines.push('');
    lines.push('Order: #' + (c.order_id || c.token || 'pending'));
    if (c.email) lines.push('Email: ' + c.email);
    if (c.shipping_address && c.shipping_address.name) lines.push('Name: ' + c.shipping_address.name);
    if (c.shipping_address && c.shipping_address.phone) lines.push('Phone: ' + c.shipping_address.phone);
    lines.push('');
    lines.push('Items:');
    (c.line_items || []).forEach(function (it, idx) {
      var t = it.title || it.product_title || 'Item';
      if (it.variant_title && it.variant_title !== 'Default Title') t += ' (' + it.variant_title + ')';
      var lineTotal = (it.line_price != null ? it.line_price : (it.price * it.quantity));
      lines.push((idx + 1) + '. ' + t);
      lines.push('   Qty ' + it.quantity + ' × ' + formatINR(it.price) + ' = ' + formatINR(lineTotal));
    });
    lines.push('');
    lines.push('Total: ' + formatINR(c.total_price));
    if (c.shipping_address) {
      var addr = c.shipping_address;
      var addrLine = [addr.address1, addr.address2, addr.city, addr.province, addr.zip].filter(Boolean).join(', ');
      if (addrLine) { lines.push(''); lines.push('Ship to: ' + addrLine); }
    }
    if (c.note) { lines.push(''); lines.push('Note: ' + c.note); }
    lines.push('');
    lines.push('Please confirm production timeline and any customisation details.');

    var message = lines.join('\n');
    var url = 'https://wa.me/+919480150888?text=' + encodeURIComponent(message);

    var container = document.getElementById('meru-wa-order-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'meru-wa-order-container';
      var target = document.querySelector('.os-step, .step__sections, main, body');
      (target || document.body).insertBefore(container, target ? target.firstChild : null);
    }
    container.innerHTML =
      '<div class="meru-wa-order-box">' +
        '<h3>Order placed — share details on WhatsApp</h3>' +
        '<p>For faster customisation, engraving approval, and dispatch updates, send your order details to our team on WhatsApp.</p>' +
        '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="meru-wa-order-btn" id="meru-wa-order-btn-link">' +
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path d="M16 3C9.373 3 4 8.373 4 15c0 2.385.668 4.61 1.832 6.502L4 29l7.701-1.814A11.94 11.94 0 0016 27c6.627 0 12-5.373 12-12S22.627 3 16 3zm0 22a9.95 9.95 0 01-5.078-1.393l-.364-.217-4.573 1.077 1.099-4.461-.237-.376A9.953 9.953 0 016 15c0-5.514 4.486-10 10-10s10 4.486 10 10-4.486 10-10 10zm5.422-7.355c-.297-.148-1.757-.867-2.03-.967-.272-.099-.47-.148-.668.148-.198.297-.767.967-.94 1.166-.173.198-.347.223-.644.074-.297-.148-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.457.13-.605.133-.133.297-.347.446-.52.148-.173.198-.297.297-.495.099-.198.05-.372-.025-.52-.074-.148-.668-1.611-.915-2.207-.241-.579-.486-.5-.668-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479s1.065 2.876 1.213 3.074c.148.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.227 1.36.195 1.872.118.571-.085 1.757-.718 2.006-1.413.248-.694.248-1.29.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>' +
          'Send Order on WhatsApp' +
        '</a>' +
      '</div>';

    var linkEl = document.getElementById('meru-wa-order-btn-link');
    if (linkEl) {
      linkEl.addEventListener('click', function () {
        if (window.gtag) {
          window.gtag('event', 'whatsapp_click_thankyou', {
            event_category: 'whatsapp',
            event_label: 'order_status_page',
            value: (c.total_price || 0),
            currency: 'INR'
          });
          window.gtag('event', 'whatsapp_click_all', {
            event_category: 'whatsapp',
            source: 'thankyou',
            event_label: 'order_status_page',
            value: (c.total_price || 0),
            currency: 'INR'
          });
        }
      });
    }
    return true;
  }

  // Try immediately, then retry a few times in case Shopify object is not yet ready
  if (!buildAndInsert()) {
    var attempts = 0;
    var t = setInterval(function () {
      attempts++;
      if (buildAndInsert() || attempts > 20) clearInterval(t);
    }, 300);
  }
})();
</script>
